<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Calculator</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.calculator {
  width: 320px;
  background: black;
  padding: 20px;
  border-radius: 30px;
}

#display {
  width: 100%;
  height: 80px;
  background: black;
  color: white;
  font-size: 40px;
  text-align: right;
  border: none;
  margin-bottom: 20px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  cursor: pointer;
}

/* Colors */
.gray { background: #a5a5a5; }
.dark { background: #333; color: white; }
.orange { background: #ff9500; color: white; }

.zero {
  grid-column: span 2;
  border-radius: 30px;
  text-align: left;
  padding-left: 20px;
}
</style>

</head>
<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button class="gray" onclick="clearDisplay()">AC</button>
    <button class="gray" onclick="del()">⌫</button>
    <button class="gray" onclick="add('%')">%</button>
    <button class="orange" onclick="add('/')">÷</button>

    <button class="dark" onclick="add('7')">7</button>
    <button class="dark" onclick="add('8')">8</button>
    <button class="dark" onclick="add('9')">9</button>
    <button class="orange" onclick="add('*')">×</button>

    <button class="dark" onclick="add('4')">4</button>
    <button class="dark" onclick="add('5')">5</button>
    <button class="dark" onclick="add('6')">6</button>
    <button class="orange" onclick="add('-')">−</button>

    <button class="dark" onclick="add('1')">1</button>
    <button class="dark" onclick="add('2')">2</button>
    <button class="dark" onclick="add('3')">3</button>
    <button class="orange" onclick="add('+')">+</button>

    <button class="dark zero" onclick="add('0')">0</button>
    <button class="dark" onclick="add('.')">.</button>
    <button class="orange" onclick="calc()">=</button>
  </div>
</div>

<script>
function add(value) {
  document.getElementById("display").value += value;
}

function clearDisplay() {
  document.getElementById("display").value = "";
}

function del() {
  let x = document.getElementById("display").value;
  document.getElementById("display").value = x.slice(0, -1);
}

function calc() {
  let x = document.getElementById("display").value;
  try {
    document.getElementById("display").value = eval(x);
  } catch {
    alert("Error");
  }
}
</script>

</body>
</html>
